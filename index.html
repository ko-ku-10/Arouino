<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイムセンサーモニター</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f0f2f5; }
        .box { background: white; padding: 30px; display: inline-block; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .value { font-size: 64px; color: #00bcd4; font-weight: bold; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="box">
        <h1>現在のセンサー値 (ThingSpeak版)</h1>
        <div class="value" id="sensor-val">---</div>
        <p>（15秒ごとに自動更新中）</p>
    </div>

    <script>
        const channelId = "3406755"; // ★自分のChannel ID（数字）に変える
        const readKey = "X3ZZ6SZO18BXU386"; // ★自分のRead API Keyに変える
        const url = `https://api.thingspeak.com/channels/${channelId}/fields/1/last.json?api_key=${readKey}`;

        function fetchValue() {
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if(data && data.field1) {
                        document.getElementById('sensor-val').innerText = data.field1;
                    }
                })
                .catch(err => console.error("データ取得エラー:", err));
        }

        fetchValue();
        setInterval(fetchValue, 15000); // 15秒ごとに読み込み
    </script>
</body>
</html>
